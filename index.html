<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Collection of Poems</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Playfair Display', serif;
    }

    .fancy-hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      
      /* MAKE SURE YOUR IMAGE NAME MATCHES HERE */
      background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('A Lonely Wolf at Morningside.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .hero-text h1 {
      font-size: 4rem;
      font-weight: 400;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .hero-text p {
      font-size: 1.2rem;
      letter-spacing: 2px;
      font-style: italic;
      color: #a9a9a9;
    }

    .fancy-content {
      padding: 100px 20px;
      background-color: #0f0f0f;
    }

    .poem-container {
      max-width: 600px;
      margin: 0 auto 150px auto;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.2s ease-out, transform 1.2s ease-out;
    }

    .poem-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .poem-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 30px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .poem-body {
      font-size: 1.4rem;
      line-height: 2.2;
    }
  </style>
</head>
<body>

  <div class="fancy-hero">
    <div class="hero-text">
      <h1>Author Name</h1>
      <p>A Collection of Poems</p>
    </div>
  </div>

  <div class="fancy-content">
    <div class="poem-container hidden">
      <h2 class="poem-title">The First Fall</h2>
      <p class="poem-body">
        Leaves turn to gold,<br>
        The wind grows cold,<br>
        A story told,<br>
        In whispers old.
      </p>
    </div>

    <div class="poem-container hidden">
      <h2 class="poem-title">Midnight Echoes</h2>
      <p class="poem-body">
        Stars awake in the velvet sky,<br>
        Watching the quiet world drift by,<br>
        Silent shadows gently sigh,<br>
        Where the forgotten dreams lie.
      </p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.2 });

      const poems = document.querySelectorAll('.poem-container');
      poems.forEach(poem => {
        observer.observe(poem);
      });
    });
  </script>

</body>
</html>
